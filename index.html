  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    -webkit-font-smoothing: antialiased;
  }

  body {
    background-image:
      radial-gradient(ellipse at top, rgba(201,168,76,0.06), transparent 60%);
  }

  a { color: inherit; }

  .wrap {
    --wrap-pad-x: 1.5rem;
    max-width: 980px;
    margin: 0 auto;
    padding: 2.75rem var(--wrap-pad-x) 5rem;
  }

  @media (max-width: 560px) {
    .wrap {
      --wrap-pad-x: 0.85rem;
      padding-top: 2rem;
    }
  }

  header.hero {
    text-align: center;
    margin-bottom: 2.25rem;
  }

  .eyebrow {
    font-family: var(--font-ui);
    font-size: 0.72rem;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--gold);
    margin: 0 0 0.6rem;
  }

  h1 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: clamp(1.9rem, 4.5vw, 2.7rem);
    letter-spacing: 0.03em;
    margin: 0 0 0.55rem;
    text-wrap: balance;
    color: var(--gold-bright);
  }

  .subtitle {
    font-family: var(--font-body);
    font-style: italic;
    color: var(--text-muted);
    font-size: 1rem;
    max-width: 46ch;
    margin: 0 auto;
    text-wrap: balance;
  }

  /* ---- controls ---- */

  .controls {
    display: flex;
    flex-direction: column;
    gap: 0.9rem;
    margin-bottom: 1.75rem;
  }

  .search-row {
    position: relative;
    max-width: 420px;
    margin: 0 auto;
    width: 100%;
  }

  .search-row input {
    width: 100%;
    padding: 0.65rem 1rem 0.65rem 2.4rem;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 0.88rem;
    border-radius: 3px;
    outline: none;
    transition: border-color 0.15s ease;
  }

  .search-row input:focus {
    border-color: var(--border-strong);
  }

  .search-row svg {
    position: absolute;
    left: 0.85rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    pointer-events: none;
  }

  .class-tabs {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .class-tab {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.5rem 1.05rem;
    font-family: var(--font-display);
    font-size: 0.82rem;
    letter-spacing: 0.03em;
    font-weight: 700;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    border-radius: 3px;
    transition: all 0.15s ease;
  }

  .class-tab:hover { border-color: var(--border-strong); }

  .class-tab[aria-pressed="true"] {
    color: var(--tab-color, var(--gold-bright));
    border-color: var(--tab-color, var(--gold));
    background: color-mix(in srgb, var(--tab-color, var(--gold)) 14%, var(--surface));
  }

  .class-tab .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--tab-color, var(--gold));
  }

  .filter-row {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 0.4rem;
  }

  .chip {
    padding: 0.32rem 0.75rem;
    font-family: var(--font-ui);
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    border-radius: 999px;
    transition: all 0.15s ease;
  }

  .chip:hover { color: var(--gold-bright); border-color: var(--border-strong); }

  .chip[aria-pressed="true"] {
    color: var(--bg);
    background: var(--gold);
    border-color: var(--gold);
  }

  .toggle-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 0.5rem;
    font-family: var(--font-ui);
    font-size: 0.76rem;
    color: var(--text-muted);
  }

  .toggle-row input { accent-color: var(--gold); }
  .toggle-row label { cursor: pointer; user-select: none; }

  /* ---- summary ---- */

  .summary {
    text-align: center;
    font-family: var(--font-ui);
    font-size: 0.78rem;
    color: var(--text-dim);
    margin: 0 0 2rem;
    letter-spacing: 0.01em;
  }

  .summary strong { color: var(--text-muted); font-weight: 600; }

  /* ---- navegacao rapida de nivel ---- */

  .level-nav {
    position: sticky;
    top: 0;
    z-index: 20;
    display: flex;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 0.4rem 0.6rem;
    padding: 0.65rem var(--wrap-pad-x);
    margin: 0 calc(-1 * var(--wrap-pad-x)) 1.75rem;
    max-height: 40vh;
    overflow-y: auto;
    background: color-mix(in srgb, var(--bg) 94%, transparent);
    backdrop-filter: blur(6px);
    border-bottom: 1px solid var(--border);
  }

  .level-nav:has(.level-nav-buttons:empty) {
    display: none;
  }

  .level-nav-label {
    flex: none;
    font-family: var(--font-ui);
    font-size: 0.66rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    padding-top: 0.35rem;
  }

  .level-nav-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    flex: 1;
  }

  .level-nav-btn {
    flex: none;
    padding: 0.32rem 0.7rem;
    font-family: var(--font-display);
    font-size: 0.74rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: var(--text-muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s ease;
  }

  .level-nav-btn:hover {
    color: var(--gold-bright);
    border-color: var(--border-strong);
  }

  .level-section {
    margin-bottom: 2rem;
    scroll-margin-top: 3.5rem;

  .level-heading {
    display: flex;
    align-items: baseline;
    gap: 0.75rem;

    padding-bottom: 0.4rem;
    border-bottom: 1px solid var(--border);

,"attrs":"Recarga: 5 turnos. Causa um golpe com 1.7x de dano e recebe +20 pontos de chance de crítico nesse disparo.","dropRate":null,"tradeable":true,"twoHanded":true,"seasonal":false,"market":{"tofu":{"median":45,"avg":42.6,"min":18,"max":50,"samples":141},"energia":{"median":150,"avg":147.2,"min":80,"max":150,"samples":25},"chave":{"median":25,"avg":25,"min":25,"max":25,"samples":24}}},{"key":"rugido_rochedo","name":"Rugido do Rochedo","slot":"special","rarity":"legendary","class":"guerreiro","level":null,"location":"Planície","attrs":"Recarga: 4 turnos. Reduz em 50% o dano recebido por 2 turnos e provoca o boss, fazendo com que ele foque no usuário.","dropRate":null,"tradeable":true,"twoHanded":false,"seasonal":false,"market":{"tofu":{"median":15,"avg":17,"min":3,"max":50,"samples":345},"energia":{"median":40,"avg":43,"min":40,"max":50,"samples":10},"gold":{"median":50000,"avg":44583.33,"min":15000,"max":50000,"samples":24},"chave":{"median":6.5,"avg":6.25,"min":2,"max":10,"samples":4}}},{"key":"tempestade_areia","name":"Tempestade de Areia","slot":"special","rarity":"legendary","class":"mago","level":null,"location":"Deserto Escaldante","attrs":"Recarga: 6 turnos. O próximo golpe causa 2.0x de dano.","dropRate":null,"tradeable":true,"twoHanded":true,"seasonal":false,"market":{"tofu":{"median":15,"avg":16.59,"min":1,"max":250,"samples":1983},"gold":{"median":77500,"avg":85255.15,"min":1500,"max":200000,"samples":194},"chave":{"median":18,"avg":16.66,"min":2,"max":25,"samples":219},"energia":{"median":75,"avg":68.13,"min":10,"max":120,"samples":269},"poeira":{"median":1,"avg":1.07,"min":1,"max":2,"samples":14}}},{"key":"totem_obscuro","name":"Totem Obscuro","slot":"special","rarity":"legendary","class":null,"level":null,"location":"Desconhecido (não documentado no site oficial)","attrs":"—","dropRate":null,"tradeable":true,"twoHanded":false,"seasonal":false,"market":{"tofu":{"median":14,"avg":14.42,"min":6,"max":40,"samples":77}}},{"key":"vontade_lich","name":"Vo </script>
<script>
(function () {
  var CLASS_META = {
    all:       { label: "Todos",      color: "var(--gold)" },
    universal: { label: "Universal",  color: "var(--c-universal)" },
    guerreiro: { label: "Guerreiro",  color: "var(--c-guerreiro)" },
    arqueiro:  { label: "Arqueiro",   color: "var(--c-arqueiro)" },
    mago:      { label: "Mago",       color: "var(--c-mago)" }
  };

  var SLOT_META = {
    all:        "Todos",
    weapon:     "Armas",
    armor:      "Armaduras",
    shield:     "Escudos/Quivers",
    accessory:  "Acessórios",
    consumable: "Consumíveis",
    key:        "Chaves/Pacotes",
    special:    "Únicos (drop de boss)",
    skin:       "Skins"
  };

  var RARITY_LABEL = {
    common: "comum", uncommon: "incomum", rare: "raro",
    epic: "épico", legendary: "lendário", event: "evento"
  };

  function slotGroup(slot) {
    if (slot === "shield" || slot === "quiver") return "shield";
    if (["ring", "amulet", "boots", "backpack"].includes(slot)) return "accessory";
    return slot;
  }

  function baseMap(location) {
    return location.replace(/\s*\([^)]*\)\s*$/, "").trim();
  }

  var MAP_NAMES = ["all"].concat(
    Array.from(new Set(ITEMS.map(function (i) { return baseMap(i.location); }))).sort(function (a, b) {
      return a.localeCompare(b, "pt-BR");
    })
  );

  var state = { cls: "all", slot: "all", map: "all", q: "", includeUniversal: true, includeSeasonal: true };

  var classTabsEl = document.getElementById("classTabs");
  var slotChipsEl = document.getElementById("slotChips");
  var mapChipsEl = document.getElementById("mapChips");
  var searchEl = document.getElementById("search");
  var universalToggle = document.getElementById("includeUniversal");
  var seasonalToggle = document.getElementById("includeSeasonal");
  var summaryEl = document.getElementById("summary");
  var resultsEl = document.getElementById("results");
  var levelNavEl = document.getElementById("levelNavButtons");

  Object.keys(CLASS_META).forEach(function (key) {
    var meta = CLASS_META[key];
    var btn = document.createElement("button");
    btn.className = "class-tab";
    btn.type = "button";
    btn.setAttribute("role", "tab");
    btn.setAttribute("aria-pressed", key === state.cls ? "true" : "false");
    btn.style.setProperty("--tab-color", meta.color);
    btn.innerHTML = '<span class="dot"></span>' + meta.label;
    btn.addEventListener("click", function () {
      state.cls = key;
      document.querySelectorAll(".class-tab").forEach(function (b) { b.setAttribute("aria-pressed", "false"); });
      btn.setAttribute("aria-pressed", "true");
      universalToggle.parentElement.style.display = (key === "all" || key === "universal") ? "none" : "flex";
      render();
    });
    classTabsEl.appendChild(btn);
  });

  Object.keys(SLOT_META).forEach(function (key) {
    var btn = document.createElement("button");
    btn.className = "chip";
    btn.type = "button";
    btn.setAttribute("aria-pressed", key === state.slot ? "true" : "false");
    btn.textContent = SLOT_META[key];
    btn.addEventListener("click", function () {
      state.slot = key;
      slotChipsEl.querySelectorAll(".chip").forEach(function (b) { b.setAttribute("aria-pressed", "false"); });
      btn.setAttribute("aria-pressed", "true");
      render();
    });
    slotChipsEl.appendChild(btn);
  });

  MAP_NAMES.forEach(function (name) {
    var key = name === "all" ? "all" : name;
    var btn = document.createElement("button");
    btn.className = "chip";
    btn.type = "button";
    btn.setAttribute("aria-pressed", key === state.map ? "true" : "false");
    btn.textContent = name === "all" ? "Todos os mapas" : name;
    btn.addEventListener("click", function () {
      state.map = key;
      mapChipsEl.querySelectorAll(".chip").forEach(function (b) { b.setAttribute("aria-pressed", "false"); });
      btn.setAttribute("aria-pressed", "true");
      render();
    });
    mapChipsEl.appendChild(btn);
  });

  searchEl.addEventListener("input", function () {
    state.q = searchEl.value.trim().toLowerCase();
    render();
  });

  universalToggle.addEventListener("change", function () {
    state.includeUniversal = universalToggle.checked;
    render();
  });

  seasonalToggle.addEventListener("change", function () {
    state.includeSeasonal = seasonalToggle.checked;
    render();
  });

  function classBadge(cls) {
    var meta = CLASS_META[cls || "universal"];
    var span = document.createElement("span");
    span.className = "class-badge";
    span.style.setProperty("--pill-color", meta.color);
    span.innerHTML = '<span class="dot"></span>' + meta.label;
    return span;
  }

  function rarityBadge(rarity) {
    var span = document.createElement("span");
    span.className = "badge";
    span.style.background = "color-mix(in srgb, var(--r-" + rarity + ", var(--text-dim)) 16%, transparent)";
    span.style.color = "var(--r-" + rarity + ", var(--text-muted))";
    span.style.border = "1px solid color-mix(in srgb, var(--r-" + rarity + ", var(--text-dim)) 40%, transparent)";
    span.textContent = RARITY_LABEL[rarity] || rarity;
    return span;
  }

  var CURRENCY_ORDER = ["gold", "tofu", "chave", "energia", "poeira"];
  var CURRENCY_ICON = { gold: "🪙", tofu: "🧀", chave: "🔑", energia: "⚡", poeira: "✨" };

  function marketBlock(icon, stats) {
    var median = Math.round(stats.median).toLocaleString("pt-BR");
    var min = Math.round(stats.min).toLocaleString("pt-BR");
    var max = Math.round(stats.max).toLocaleString("pt-BR");
    var range = stats.min === stats.max ? "" : (min + "–" + max + " · ");
    return '<div><span class="price">' + icon + ' ' + median + '</span>' +
      '<span class="samples">' + range + stats.samples + (stats.samples === 1 ? ' anúncio' : ' anúncios') + '</span></div>';
  }

  function matches(item) {
    if (state.q && !item.name.toLowerCase().includes(state.q)) return false;
    if (state.slot !== "all" && slotGroup(item.slot) !== state.slot) return false;
    if (state.map !== "all" && baseMap(item.location) !== state.map) return false;
    if (!state.includeSeasonal && item.seasonal) return false;
    if (state.cls === "all") return true;
    if (state.cls === "universal") return !item.class;
    if (!item.class) return state.includeUniversal;
    return item.class === state.cls;
  }

  function render() {
    var filtered = ITEMS.filter(matches);
    resultsEl.innerHTML = "";
    levelNavEl.innerHTML = "";

    var classLabel = CLASS_META[state.cls].label;
    summaryEl.innerHTML = '<strong>' + filtered.length + '</strong> ' +
      (filtered.length === 1 ? "item encontrado" : "itens encontrados") +
      (state.cls !== "all" ? ' para <strong style="color:' + CLASS_META[state.cls].color.replace('var(--', 'var(--') + '">' + classLabel + '</strong>' : "");

    if (filtered.length === 0) {
      var empty = document.createElement("div");
      empty.className = "empty-state";
      empty.textContent = "Nenhum item encontrado com esses filtros.";
      resultsEl.appendChild(empty);
      return;
    }

    var normal = filtered.filter(function (i) { return i.level !== null && i.level !== undefined; });
    var special = filtered.filter(function (i) { return i.level === null || i.level === undefined; });

    var byLevel = {};
    normal.forEach(function (item) {
      (byLevel[item.level] = byLevel[item.level] || []).push(item);
    });

    Object.keys(byLevel).map(Number).sort(function (a, b) { return a - b; }).forEach(function (level) {
      var items = byLevel[level];
      var sectionId = "level-" + level;
      var heading = '<span class="lvl">Nível <span class="num">' + level + '</span>+</span>' +
        '<span class="count">' + items.length + (items.length === 1 ? ' item' : ' itens') + '</span>';
      resultsEl.appendChild(buildLevelSection(heading, items, sectionId));
      addLevelNavButton(String(level), sectionId);
    });

    if (special.length) {
      var sectionId = "level-special";
      var heading = '<span class="lvl">Itens Especiais</span>' +
        '<span class="count">' + special.length + (special.length === 1 ? ' item' : ' itens') + ' · drop de boss não documentado no site oficial</span>';
      resultsEl.appendChild(buildLevelSection(heading, special, sectionId));
      addLevelNavButton("Especiais", sectionId);
    }
  }

  function addLevelNavButton(label, sectionId) {
    var btn = document.createElement("button");
    btn.type = "button";
    btn.className = "level-nav-btn";
    btn.textContent = label;
    btn.addEventListener("click", function () {
      var el = document.getElementById(sectionId);
      if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
    });
    levelNavEl.appendChild(btn);
  }

  function buildLevelSection(headingHtml, items, sectionId) {
      var section = document.createElement("section");
      section.className = "level-section";
      if (sectionId) section.id = sectionId;

      var heading = document.createElement("div");
      heading.className = "level-heading";
      heading.innerHTML = headingHtml;
      section.appendChild(heading);

      var scroll = document.createElement("div");
      scroll.className = "table-scroll";
      var table = document.createElement("table");
      table.innerHTML = '<thead><tr>' +
        '<th>Item</th><th>Classe</th><th>Local</th><th>Atributos</th><th>Drop</th><th>Preço de Mercado</th>' +
        '</tr></thead>';
      var tbody = document.createElement("tbody");

      items.sort(function (a, b) { return a.name.localeCompare(b.name, "pt-BR"); }).forEach(function (item) {
        var tr = document.createElement("tr");

        var tdName = document.createElement("td");
        var nameDiv = document.createElement("div");
        nameDiv.className = "item-name";
        nameDiv.textContent = item.name;
        tdName.appendChild(nameDiv);
        var metaDiv = document.createElement("div");
        metaDiv.className = "item-meta";
        metaDiv.appendChild(rarityBadge(item.rarity));
        if (item.twoHanded) {
          var th = document.createElement("span");
          th.className = "badge two-handed";
          th.textContent = "2 mãos";
          metaDiv.appendChild(th);
        }
        if (item.seasonal) {
          var sb = document.createElement("span");
          sb.className = "badge seasonal";
          sb.textContent = "Sazonal";
          metaDiv.appendChild(sb);
        }
        tdName.appendChild(metaDiv);
        tr.appendChild(tdName);

        var tdClass = document.createElement("td");
        tdClass.appendChild(classBadge(item.class));
        tr.appendChild(tdClass);

        var tdLoc = document.createElement("td");
        tdLoc.className = "cell-location";
        tdLoc.textContent = item.location;
        tr.appendChild(tdLoc);

        var tdAttrs = document.createElement("td");
        tdAttrs.className = "cell-attrs";
        tdAttrs.textContent = item.attrs;
        tr.appendChild(tdAttrs);

        var tdDrop = document.createElement("td");
        tdDrop.className = "cell-drop";
        tdDrop.textContent = item.dropRate || "—";
        tr.appendChild(tdDrop);

        var tdMarket = document.createElement("td");
        tdMarket.className = "cell-market";
        var hasMarket = item.market && CURRENCY_ORDER.some(function (c) { return item.market[c]; });
        if (hasMarket) {
          var parts = CURRENCY_ORDER
            .filter(function (c) { return item.market[c]; })
            .map(function (c) { return marketBlock(CURRENCY_ICON[c], item.market[c]); });
          tdMarket.innerHTML = parts.join("");
        } else {
          tdMarket.innerHTML = '<span class="none">—</span>';
        }
        tr.appendChild(tdMarket);

        tbody.appendChild(tr);
      });

      table.appendChild(tbody);
      scroll.appendChild(table);
      section.appendChild(scroll);
      return section;
  }

  document.getElementById("extractDate").textContent = new Date().toLocaleDateString("pt-BR", { day: "2-digit", month: "long", year: "numeric" });

  classTabsEl.querySelector('.class-tab[aria-pressed="true"]');
  universalToggle.parentElement.style.display = "none";
  render();
})();
</script>
</body>
</html>
